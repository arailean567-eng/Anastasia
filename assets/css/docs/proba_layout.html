<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Proba Layout</title>

  <style>
    /* ================= FLEXBOX ================= */

    .container {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      height: 80vh;
      border: 6px double black;
    }

    /* Box 1 – stânga sus */
    .box-1 {
      align-self: flex-start;
      background: lightblue;
      padding: 10px;
    }

    /* Box 2 – centru perfect */
    .box-2 {
      margin: auto;
      background: lightgreen;
      padding: 10px;
    }

    /* Box 3 – dreapta jos */
    .box-3 {
      align-self: flex-end;
      background: lightcoral;
      padding: 10px;
    }

    /* ================= GRID ================= */

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 25px;
      background: rgba(0,0,0,0.08);
      padding: 20px;
      margin-top: 40px;
    }

    /* Primul element ocupă toată lățimea */
    .item1 {
      grid-column: 1 / 3;
    }

    .grid div {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

  </style>
</head>

<body>

<!-- ================= FLEXBOX ================= -->
<div class="container">

  <div class="box-1">Box 1 (stânga sus)</div>

  <div class="box-2">
    Box 2 (centru perfect)
  </div>

  <div class="box-3">Box 3 (dreapta jos)</div>

</div>

<!-- Explicație obligatorie -->
<!--
Am folosit:
- display: flex pentru container
- align-self pentru poziționare individuală
- margin: auto pentru centrarea perfectă a Box 2
Acestea modifică alinierea implicită a Flexbox-ului.
-->

<!-- ================= GRID ================= -->
<div class="grid">

  <div class="item1">Element 1 (full width)</div>
  <div>Element 2</div>
  <div>Element 3</div>
  <div>Element 4</div>

</div>

</body>
</html>
